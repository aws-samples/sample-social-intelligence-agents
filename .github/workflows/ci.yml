# CI — lint, format, and unit tests.
# Integration tests are excluded because they require live AWS credentials
# (see tests/integration/). Run those separately with real IAM access.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: >
          uv run ruff check
          src/
          entrypoint.py
          scripts/
          tests/
          infra/app.py
          infra/gateway_stack.py
          infra/stacks/
          infra/lambda/handler.py
          demo/config.py

      - name: Format check
        run: >
          uv run ruff format --check
          src/
          entrypoint.py
          scripts/
          tests/
          infra/gateway_stack.py
          infra/stacks/
          infra/lambda/handler.py
          demo/config.py

      - name: Unit tests
        run: uv run python -m pytest tests/ -q --ignore=tests/integration
